<div class="drawer xl:drawer-open">
    <input id="my-drawer" type="checkbox" class="drawer-toggle" [checked]="layoutService.mobileOpen()"
        (change)="layoutService.toggleSidebar()" />

    <div class="drawer-content flex flex-col h-screen bg-base-200 transition-all duration-300 overflow-hidden">


        <app-header /> <!-- This has the old hamburger, might need to update or remove -->

        <app-navbar />

        <!-- Scrollable Content -->
        <div class="flex flex-col grow p-6 gap-2 overflow-y-auto">
            <router-outlet />
        </div>

        <app-footer />
    </div>

    <div class="drawer-side z-50 overflow-x-hidden">
        <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"
            (click)="layoutService.setMobileOpen(false)"></label>


        <aside class="bg-base-100 min-h-full transition-[width] duration-300 border-r border-base-300
                      flex flex-col overflow-hidden w-72" [class.xl:w-[70px]]="!layoutService.desktopExpanded()">

            <app-sidebar />
        </aside>

    </div>

</div>
