<!-- Toast container: fijo en la esquina inferior derecha -->
<div class="toast toast-end toast-top z-9999 mt-2">
  @for (alerta of alertService.alertas(); track alerta.id) {
    <div
      class="alert shadow-lg alert-enter max-w-sm relative overflow-hidden"
      [class.alert-success]="alerta.tipo === 'success'"
      [class.alert-warning]="alerta.tipo === 'warning'"
      [class.alert-error]="alerta.tipo === 'error'"
    >
      <!-- Ícono según tipo -->
      @switch (alerta.tipo) {
        @case ('success') {
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        }
        @case ('warning') {
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        }
        @case ('error') {
          <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        }
      }

      <!-- Mensaje -->
      <span class="text-sm font-medium">{{ alerta.mensaje }}</span>

      <!-- Botón cerrar -->
      <button class="btn btn-ghost btn-xs btn-circle" (click)="alertService.cerrar(alerta.id)">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Barra de progreso de auto-cierre -->
      <span class="alert-progress"></span>
    </div>
  }
</div>
